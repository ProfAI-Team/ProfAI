services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    depends_on:
      - server
    networks:
      - profai-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: builder
    command: sh -c "npx prisma migrate deploy && npm run dev"
    ports:
      - "5000:5000"
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql://profai:profai123@db:5432/profai?schema=public
      - REDIS_URL=redis://redis:6379
      - RUN_JOBS=1
      - JWT_SECRET=profai-jwt-secret-change-in-production
      - PORT=5000
      - CORS_ORIGIN=http://localhost:3001
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash-lite}
      - GEMINI_FREE_TIER=${GEMINI_FREE_TIER:-true}
      - NODE_ENV=development
    volumes:
      - ./server:/app
      - /app/node_modules
      - uploads:/app/uploads
    networks:
      - profai-network

  db:
    # Phase 7 (7.3) swapped postgres:15 for the pgvector-bundled image so
    # the vector extension can be enabled by Prisma migrations. Existing
    # volumes are ABI-compatible (same Postgres 15 engine); the extension
    # install happens on first migrate after container rebuild.
    image: pgvector/pgvector:pg15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=profai
      - POSTGRES_PASSWORD=profai123
      - POSTGRES_DB=profai
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - profai-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - profai-network

volumes:
  pgdata:
  uploads:

networks:
  profai-network:
    driver: bridge
